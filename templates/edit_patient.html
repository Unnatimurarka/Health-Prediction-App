{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning text-dark">
        <h3>Edit Patient</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="full_name"
                       value="{{ patient.full_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control"
                       name="date_of_birth"
                       value="{{ patient.date_of_birth }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control"
                       name="email"
                       value="{{ patient.email }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Glucose</label>
                <input type="number" step="0.01"
                       class="form-control"
                       name="glucose"
                       value="{{ patient.glucose }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Haemoglobin</label>
                <input type="number" step="0.01"
                       class="form-control"
                       name="haemoglobin"
                       value="{{ patient.haemoglobin }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cholesterol</label>
                <input type="number" step="0.01"
                       class="form-control"
                       name="cholesterol"
                       value="{{ patient.cholesterol }}" required>
            </div>

            <button class="btn btn-warning">
                Update Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
