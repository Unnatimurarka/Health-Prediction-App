{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h3>Add New Patient</h3>

    </div>

    <div class="card-body">

        <form method="POST" action="/add">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="full_name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" name="date_of_birth" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Glucose</label>
                <input type="number" step="0.01" class="form-control" name="glucose" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Haemoglobin</label>
                <input type="number" step="0.01" class="form-control" name="haemoglobin" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cholesterol</label>
                <input type="number" step="0.01" class="form-control" name="cholesterol" required>
            </div>

            <button class="btn btn-success">
                Save Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

{% endblock %}=
